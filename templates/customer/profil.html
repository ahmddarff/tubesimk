{% extends 'layout.html' %}

{% block title %}Profil Saya - Terralog{% endblock %}

{% block content %}
<div class="customer-page-shell flex-1 p-8 bg-gray-50" x-data="profilApp()">
    <div class="max-w-5xl">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-800 mb-2">Profil Saya</h1>
                <p class="text-gray-600">Kelola informasi dasar akun Anda untuk akses aplikasi.</p>
            </div>
            <button @click="isEditing = true" x-show="!isEditing" class="bg-terralogBlue hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-full transition shadow-lg">
                Edit Profil
            </button>
        </div>

        <!-- Main Profile Card -->
        <div class="bg-white rounded-2xl p-8 shadow-sm">
            <div class="flex gap-12 mb-8">
                <!-- Photo Section -->
                <div class="flex flex-col items-center">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Foto Profil</h3>
                    <div class="w-40 h-40 bg-terralogBlue rounded-full flex items-center justify-center flex-shrink-0 shadow-lg">
                        <i data-lucide="user" class="w-20 h-20 text-white/70"></i>
                    </div>
                </div>

                <!-- Form Section -->
                <div class="flex-1">
                    <!-- Username -->
                    <div class="mb-6">
                        <label class="text-lg font-bold text-gray-800 block mb-3">Username</label>
                        <input type="text" x-model="formData.username" :disabled="!isEditing" :class="isEditing ? 'bg-white' : 'bg-gray-50'" class="w-full border border-gray-300 rounded-lg px-5 py-3 text-gray-700 text-base focus:outline-none focus:ring-2 focus:ring-terralogBlue transition">
                    </div>

                    <!-- Nama Lengkap -->
                    <div class="mb-6">
                        <label class="text-lg font-bold text-gray-800 block mb-3">Nama Lengkap</label>
                        <input type="text" x-model="formData.nama_lengkap" :disabled="!isEditing" :class="isEditing ? 'bg-white' : 'bg-gray-50'" class="w-full border border-gray-300 rounded-lg px-5 py-3 text-gray-700 text-base focus:outline-none focus:ring-2 focus:ring-terralogBlue transition">
                    </div>

                    <!-- Email Pribadi -->
                    <div class="mb-6">
                        <label class="text-lg font-bold text-gray-800 block mb-3">Email Pribadi</label>
                        <input type="email" x-model="formData.email" :disabled="!isEditing" :class="isEditing ? 'bg-white' : 'bg-gray-50'" class="w-full border border-gray-300 rounded-lg px-5 py-3 text-gray-700 text-base focus:outline-none focus:ring-2 focus:ring-terralogBlue transition">
                    </div>

                    <!-- Nomor Handphone -->
                    <div class="mb-6">
                        <label class="text-lg font-bold text-gray-800 block mb-3">Nomor Handphone</label>
                        <input type="tel" x-model="formData.nomor_handphone" :disabled="!isEditing" :class="isEditing ? 'bg-white' : 'bg-gray-50'" placeholder="Belum diatur" class="w-full border border-gray-300 rounded-lg px-5 py-3 text-gray-700 text-base focus:outline-none focus:ring-2 focus:ring-terralogBlue transition">
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div x-show="isEditing" class="flex gap-4 justify-center mt-12">
            <button @click="cancelEdit()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-12 rounded-full transition">
                Batal
            </button>
            <button @click="saveChanges()" class="bg-terralogBlue hover:bg-blue-800 text-white font-bold py-3 px-12 rounded-full transition">
                Simpan Perubahan
            </button>
        </div>
    </div>
</div>

<script>
    function profilApp() {
        return {
            isEditing: false,
            // Mengambil data langsung dari sesi pengguna yang sedang masuk
            formData: {
                username: '{{ current_user.username }}',
                nama_lengkap: '{{ current_user.name }}', 
                email: '{{ current_user.email }}',
                nomor_handphone: '{{ current_user.phone or "" }}'
            },
            originalData: {
                username: '{{ current_user.username }}',
                nama_lengkap: '{{ current_user.name }}',
                email: '{{ current_user.email }}',
                nomor_handphone: '{{ current_user.phone or "" }}'
            },

            cancelEdit() {
                // Mengembalikan data ke kondisi semula
                this.formData = { ...this.originalData };
                this.isEditing = false;
            },

            saveChanges() {
                // Mengirimkan pembaruan data ke peladen menggunakan Fetch API
                fetch('/customer/api/update-profil', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(this.formData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        this.originalData = { ...this.formData };
                        this.isEditing = false;
                        alert('Profil Anda berhasil diperbarui.');
                    } else {
                        alert('Pembaruan gagal: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Terjadi kesalahan pada sistem saat menyimpan data.');
                });
            }
        };
    }

    lucide.createIcons();
</script>
{% endblock %}
