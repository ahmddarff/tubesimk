{% extends 'layouts/layout_customer.html' %}

{% block title %}Checkout - Terralog{% endblock %}

{% block content %}
<!-- Store pre-filled items in window object -->
<script>
    // noinspection JSUnusedAssignment
    window.preFilledItems = {{ pre_filled_items|tojson if pre_filled_items else '[]' }};
</script>
<div class="flex-1 p-8 bg-gray-50" x-data="checkoutApp()">
    <div class="max-w-5xl mx-auto">
        <!-- Breadcrumb & Summary Header -->
        <div class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-2 text-gray-600">
                <a href="/customer/daftar-menu" class="hover:text-terralogBlue">Daftar Menu</a>
                <span class="text-gray-400">›</span>
                <span class="text-gray-800 font-semibold">Checkout</span>
            </div>
            <div class="bg-yellow-400 text-gray-800 font-bold px-6 py-3 rounded-2xl text-right">
                <div class="text-sm" x-text="`${items.length} item dipesan`"></div>
                <div class="text-2xl" x-text="`${total.toLocaleString('id-ID')}`"></div>
            </div>
        </div>

        <div class="flex gap-8">
            <!-- Main Content -->
            <div class="flex-1">
                <!-- Customer Info & Meja Header -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center justify-between gap-4">
                                <div>
                                    <label class="text-gray-700 text-sm font-semibold block mb-2">Nama pemesan</label>
                                    <div class="flex items-center gap-3">
                                        <input type="text" x-model="nama" :disabled="!editingName" class="border border-gray-300 rounded-lg px-4 py-2 text-gray-800" :class="editingName ? 'bg-white' : 'bg-gray-50'">
                                        <button @click="editingName = !editingName" class="text-terralogBlue hover:text-blue-700 transition">
                                            <i data-lucide="edit-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <label class="text-gray-700 text-sm font-semibold block mb-2">Meja</label>
                            <select x-model="meja" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-terralogBlue">
                                <option value="M-102">M-102</option>
                                <option value="M-101">M-101</option>
                                <option value="M-103">M-103</option>
                                <option value="M-104">M-104</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Orders -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Pesanan Anda</h3>

                    <template x-for="(item, index) in items" :key="index">
                        <div class="rounded-xl p-6 mb-6 border-2 bg-blue-50 border-blue-200">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <h4 class="text-lg font-bold text-gray-800 mb-2" x-text="item.nama"></h4>
                                    <p class="font-semibold text-lg text-gray-600" x-text="`Rp ${item.harga.toLocaleString('id-ID')}`"></p>
                                </div>
                                <div class="flex gap-2 items-center">
                                    <button @click="decrementItem(index)" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold px-3 py-1 rounded-lg transition w-8">−</button>
                                    <div class="px-3 py-1 border border-gray-300 rounded-lg text-center min-w-12" x-text="item.qty"></div>
                                    <button @click="incrementItem(index)" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold px-3 py-1 rounded-lg transition w-8">+</button>
                                </div>
                                <button @click="deleteItem(index)" class="bg-red-500 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-lg transition ml-4 flex items-center gap-2">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    Hapus
                                </button>
                            </div>
                            <div>
                                <label class="text-gray-700 font-semibold text-sm mb-2 block">Catatan:</label>
                                <textarea placeholder="Masukkan catatan pesanan ini..." @input="updateNote(index, $event.target.value)" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none text-gray-700 focus:ring-2 focus:ring-blue-400" rows="2" :value="item.note"></textarea>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Payment Method -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Metode Pembayaran</h3>
                    <div class="flex gap-8">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" x-model="paymentMethod" value="tunai" class="w-5 h-5 text-terralogBlue">
                            <span class="text-gray-800 font-semibold">Tunai</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" x-model="paymentMethod" value="non-tunai" class="w-5 h-5 text-terralogBlue">
                            <span class="text-gray-800 font-semibold">Non Tunai</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-center mb-12">
                    <button @click="submitOrder()" :disabled="items.length === 0" class="transition text-lg shadow-lg py-4 px-24 rounded-full text-white font-bold" :class="items.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-terralogBlue hover:bg-blue-800'">
                        Pesan Sekarang
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function checkoutApp() {
        // Get pre-filled items from window object
        const preFilledItems = window.preFilledItems || [];
        
        // Load cart from localStorage or use pre-filled items
        let cartItems;
        if (preFilledItems && preFilledItems.length > 0) {
            cartItems = preFilledItems;
        } else {
            const savedCart = localStorage.getItem('cart');
            cartItems = savedCart ? JSON.parse(savedCart) : [
                { nama: 'Terralog Kopi', harga: 18000, qty: 1, note: '' },
                { nama: 'Tagalog Fried Rice', harga: 25000, qty: 1, note: '' }
            ];
        }
        
        // Transform cart items to include notes
        const items = cartItems.map(item => ({
            ...item,
            note: item.note || ''
        }));
        
        return {
            items: items,
            meja: 'M-102',
            nama: 'Matthew Shen',
            editingName: false,
            paymentMethod: 'tunai',
            
            get subtotal() {
                return this.items.reduce((sum, item) => sum + (item.harga * item.qty), 0);
            },
            
            get total() {
                return this.subtotal;
            },
            
            incrementItem(index) {
                this.items[index].qty += 1;
            },
            
            decrementItem(index) {
                if (this.items[index].qty > 1) {
                    this.items[index].qty -= 1;
                }
            },
            
            deleteItem(index) {
                this.items.splice(index, 1);
            },
            
            updateNote(index, value) {
                this.items[index].note = value;
            },
            
            submitOrder() {
                if (this.items.length === 0) {
                    alert('Pesanan masih kosong!');
                    return;
                }
                
                if (this.paymentMethod === 'tunai') {
                    const orderData = {
                        meja: this.meja,
                        nama: this.nama,
                        items: this.items,
                        paymentMethod: this.paymentMethod,
                        total: this.total,
                        subtotal: this.subtotal
                    };
                    
                    // Send order to backend
                    fetch('/customer/submit-order', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(orderData)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Clear cart from localStorage
                            localStorage.removeItem('cart');
                            
                            // Redirect to pesanan detail with order_id
                            window.location.href = `/customer/pesanan/${data.order_id}`;
                        } else {
                            alert('Gagal membuat pesanan. Silakan coba lagi.');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Terjadi kesalahan. Silakan coba lagi.');
                    });
                } else {
                    // Non-tunai payment method
                    const orderData = {
                        meja: this.meja,
                        nama: this.nama,
                        items: this.items,
                        paymentMethod: this.paymentMethod,
                        total: this.total,
                        subtotal: this.subtotal
                    };
                    
                    // Send order to backend
                    fetch('/customer/submit-order', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(orderData)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Store order data in sessionStorage for payment page
                            const paymentData = {
                                ...orderData,
                                order_id: data.order_id
                            };
                            sessionStorage.setItem('pendingOrder', JSON.stringify(paymentData));
                            
                            // Clear cart from localStorage
                            localStorage.removeItem('cart');
                            
                            // Redirect to non-tunai payment page
                            window.location.href = `/customer/pembayaran-nontunai/${data.order_id}`;
                        } else {
                            alert('Gagal membuat pesanan. Silakan coba lagi.');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Terjadi kesalahan. Silakan coba lagi.');
                    });
                }
            }
        }
    }
    
    lucide.createIcons();
</script>
{% endblock %}
