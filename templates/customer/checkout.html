{% extends "layouts/layout_customer.html" %}

{% block title %}Checkout - Terralog{% endblock %}

{% block content %}
<div class="flex-1 p-8 bg-gray-50" x-data="checkoutApp()">
    <div class="max-w-5xl mx-auto">
        <!-- Breadcrumb -->
        <div class="mb-8 flex items-center gap-2 text-gray-600">
            <a href="/customer/daftar-menu" class="hover:text-terralogBlue">Daftar Menu</a>
            <span class="text-gray-400">›</span>
            <span class="text-gray-800 font-semibold">Checkout</span>
        </div>

        <div class="flex gap-8">
            <!-- Main Content -->
            <div class="flex-1">
                <!-- Header with summary -->
                <div class="bg-white rounded-2xl p-6 mb-8 flex items-center justify-between">
                    <h1 class="text-3xl font-bold text-gray-800">Checkout</h1>
                    <div class="bg-yellow-400 text-gray-800 font-bold px-6 py-3 rounded-2xl text-right">
                        <div class="text-sm" x-text="`${items.length} item dipilih`"></div>
                        <div class="text-2xl" x-text="`${total.toLocaleString('id-ID')}`"></div>
                    </div>
                </div>

                <!-- Meja Selection -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <label class="text-gray-700 font-semibold mb-3 block">Meja</label>
                    <select x-model="meja" class="w-full md:w-48 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-terralogBlue">
                        <option value="M-102">M-102</option>
                        <option value="M-101">M-101</option>
                        <option value="M-103">M-103</option>
                        <option value="M-104">M-104</option>
                    </select>
                </div>

                <!-- Customer Info -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">Nama pemesan</h3>
                        <button @click="editingName = !editingName" class="text-terralogBlue hover:text-blue-700 transition">
                            <i data-lucide="edit-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <input type="text" x-model="nama" :disabled="!editingName" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-800" :class="editingName ? 'bg-white' : 'bg-gray-50'">
                </div>

                <!-- Orders -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Pesanan Anda</h3>

                    <template x-for="(item, index) in items" :key="index">
                        <div class="rounded-xl p-6 mb-6 border-2" :class="index === 0 ? 'bg-blue-50 border-blue-200' : 'bg-orange-50 border-orange-200'">
                            <div class="flex gap-4 mb-6">
                                <div class="w-24 h-24 rounded-lg flex items-center justify-center flex-shrink-0" :class="index === 0 ? 'bg-terralogBlue' : 'bg-terralogOrange'">
                                    <i :data-lucide="index === 0 ? 'coffee' : 'rice'" class="w-12 h-12 text-white/50"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="text-lg font-bold text-gray-800 mb-2" x-text="item.nama"></h4>
                                    <p class="font-semibold text-lg" :class="index === 0 ? 'text-terralogBlue' : 'text-terralogOrange'" x-text="`Rp ${item.harga.toLocaleString('id-ID')}`"></p>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="decrementItem(index)" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold px-3 py-2 rounded-lg transition">-</button>
                                    <div class="px-4 py-2 border border-gray-300 rounded-lg text-center min-w-12" x-text="item.qty"></div>
                                    <button @click="incrementItem(index)" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold px-3 py-2 rounded-lg transition">+</button>
                                </div>
                                <button @click="deleteItem(index)" class="bg-red-500 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-lg transition flex items-center gap-2">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    Hapus
                                </button>
                            </div>
                            <div>
                                <label class="text-gray-700 font-semibold text-sm mb-2 block">Catatan:</label>
                                <textarea placeholder="Masukkan catatan pesanan ini..." @input="updateNote(index, $event.target.value)" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none text-gray-700" :class="index === 0 ? 'focus:ring-2 focus:ring-blue-400' : 'focus:ring-2 focus:ring-orange-400'" rows="3" :value="item.note"></textarea>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Payment Method -->
                <div class="bg-white rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Metode Pembayaran</h3>
                    <div class="flex gap-8">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" x-model="paymentMethod" value="tunai" class="w-5 h-5 text-terralogBlue">
                            <span class="text-gray-800 font-semibold">Tunai</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" x-model="paymentMethod" value="non-tunai" class="w-5 h-5 text-terralogBlue">
                            <span class="text-gray-800 font-semibold">Non Tunai</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-center mb-12">
                    <button @click="submitOrder()" :disabled="items.length === 0" class="transition text-lg shadow-lg py-4 px-24 rounded-full text-white font-bold" :class="items.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-terralogBlue hover:bg-blue-800'">
                        Pesan Sekarang
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function checkoutApp() {
        return {
            items: [
                { nama: 'Terralog Kopi', harga: 18000, qty: 1, note: '' },
                { nama: 'Tagalog Fried Rice', harga: 25000, qty: 1, note: '' }
            ],
            meja: 'M-102',
            nama: 'Matthew Shen',
            editingName: false,
            paymentMethod: 'tunai',
            
            get subtotal() {
                return this.items.reduce((sum, item) => sum + (item.harga * item.qty), 0);
            },
            
            get ppn() {
                return Math.round(this.subtotal * 0.1);
            },
            
            get total() {
                return this.subtotal + this.ppn;
            },
            
            incrementItem(index) {
                this.items[index].qty += 1;
            },
            
            decrementItem(index) {
                if (this.items[index].qty > 1) {
                    this.items[index].qty -= 1;
                }
            },
            
            deleteItem(index) {
                this.items.splice(index, 1);
            },
            
            updateNote(index, value) {
                this.items[index].note = value;
            },
            
            submitOrder() {
                if (this.items.length === 0) {
                    alert('Pesanan masih kosong!');
                    return;
                }
                
                const orderData = {
                    meja: this.meja,
                    nama: this.nama,
                    items: this.items,
                    paymentMethod: this.paymentMethod,
                    total: this.total,
                    subtotal: this.subtotal,
                    ppn: this.ppn
                };
                
                console.log('Order submitted:', orderData);
                alert(`Pesanan berhasil! Total: Rp ${this.total.toLocaleString('id-ID')}\nMeja: ${this.meja}\nMetode: ${this.paymentMethod}`);
                
                // Reset form
                this.items = [
                    { nama: 'Terralog Kopi', harga: 18000, qty: 1, note: '' },
                    { nama: 'Tagalog Fried Rice', harga: 25000, qty: 1, note: '' }
                ];
            }
        }
    }
    
    lucide.createIcons();
</script>
{% endblock %}
