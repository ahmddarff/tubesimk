<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} - Terralog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>[x-cloak] { display: none !important; }</style>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { sans: ['Inter', 'sans-serif'], },
              colors: {
                terralogBlue: '#0022AA',
                terralogGold: '#F2C94C',
                terralogOrange: '#E99817',
                terralogPeach: '#F7E190',
              }
            }
          }
        }
    </script>
</head>
<body class="bg-[#F5F7FF] font-sans text-gray-800">

    <div class="min-h-screen flex">
        
        <aside class="fixed left-0 top-0 w-72 h-screen z-40 shadow-sm border-r border-gray-100">
            {% include 'includes/sidebar.html' %}
        </aside>

        <div class="flex-1 ml-72 flex flex-col min-h-screen">
            
            <header class="sticky top-0 z-30 bg-white shadow-sm">
                {% include 'includes/navbar.html' %}
            </header>

            <main class="flex-1 p-8 overflow-x-hidden">
                {% block content %}{% endblock %}
            </main>
            
        </div>
        
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
        document.addEventListener('alpine:navigated', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
