<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} - Terralog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>[x-cloak] { display: none !important; }</style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

<style>
/* Tampilan di Dashboard */
#receipt-print { display: none; }

@media print {
    /* Sembunyikan elemen dashboard UI */
    body * { visibility: hidden; }
    
    /* Tampilkan area struk */
    #receipt-print, #receipt-print * {
        visibility: visible;
    }

    #receipt-print {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 80mm; 
        padding: 4mm;
        background: white;
        color: black !important;
        font-family: 'Inter', sans-serif; 
        font-size: 10pt;
        line-height: 1.4;
    }

   
    @page {
        size: 80mm auto; 
        margin: 0;
    }

   
    html, body {
        margin: 0;
        padding: 0;
    }
}
</style>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
              },
              colors: {
                terralogBlue: '#0022AA',
                terralogGold: '#FFD21E', // Warna border tab aktif
                // Warna Gold Border (Ronchi 300)
                terralogGold: '#F2C94C',
                 // Warna Tombol Tambah (Ronchi 500)
                terralogOrange: '#E99817',
                // Warna Card Atas (Ronchi 200)
                terralogPeach: '#F7E190',
              }
            }
          }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex min-h-screen">
        {% include 'includes/sidebar_kasir.html' %}

        <div class="flex-1 flex flex-col pl-72">
            
            {% include 'includes/navbar_kasir.html' %}

            <main class="p-8 bg-[#F5F7FF] flex-1">
                {% block content %}{% endblock %}
            </main>
            
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
