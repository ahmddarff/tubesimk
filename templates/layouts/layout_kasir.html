<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} - Terralog</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        /* PRINT STRUK */
        #receipt-print {
            display: none;
        }

        @media print {

            body * {
                visibility: hidden;
            }

            #receipt-print,
            #receipt-print * {
                visibility: visible;
            }

            #receipt-print {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                padding: 4mm;
                background: white;
                color: black !important;
                font-size: 10pt;
                line-height: 1.4;
            }

            @page {
                size: 80mm auto;
                margin: 0;
            }

            html,
            body {
                margin: 0;
                padding: 0;
            }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },

                    colors: {
                        terralogBlue: '#0022AA',
                        terralogGold: '#F2C94C',
                        terralogOrange: '#E99817',
                        terralogPeach: '#F7E190',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#F5F7FF] font-sans">

    <div class="min-h-screen flex">

        <!-- SIDEBAR -->
        <aside class="fixed left-0 top-0 w-72 h-screen z-40">
            {% include 'includes/sidebar_kasir.html' %}
        </aside>

        <!-- CONTENT -->
        <div class="flex-1 ml-72 flex flex-col min-h-screen">

            <!-- NAVBAR -->
            <header class="sticky top-0 z-30 bg-white shadow-sm">
                {% include 'includes/navbar_kasir.html' %}
            </header>

            <!-- MAIN -->
            <main class="flex-1 p-8 overflow-x-hidden">
                {% block content %}{% endblock %}
            </main>

        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        document.addEventListener('alpine:navigated', () => {
            lucide.createIcons();
        });
    </script>

</body>
</html>
