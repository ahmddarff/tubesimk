<div x-data x-show="$store.confirmModal.show" class="fixed inset-0 z-[2000] overflow-y-auto" x-cloak>
    
    <div x-show="$store.confirmModal.show"
         x-transition.opacity.duration.300ms
         @click="$store.confirmModal.show = false"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
        <div x-show="$store.confirmModal.show"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative inline-block w-full max-w-sm p-6 overflow-hidden text-left align-middle transition-all transform bg-white shadow-2xl rounded-2xl">
            
            <div class="flex flex-col items-center justify-center mb-6">
                <div class="flex items-center justify-center w-16 h-16 rounded-full mb-4"
                     :class="{
                         'bg-red-100 text-red-600': $store.confirmModal.type === 'danger',
                         'bg-blue-100 text-terralogBlue': $store.confirmModal.type === 'primary',
                         'bg-orange-100 text-terralogOrange': $store.confirmModal.type === 'warning'
                     }">
                    <i :data-lucide="$store.confirmModal.type === 'danger' ? 'alert-triangle' : ($store.confirmModal.type === 'warning' ? 'help-circle' : 'info')" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-black text-gray-900" x-text="$store.confirmModal.title"></h3>
                <p class="text-sm font-medium text-gray-500 mt-1 text-center" x-text="$store.confirmModal.message"></p>
            </div>

            <div class="flex gap-3">
                <button @click="$store.confirmModal.show = false" type="button" class="flex-1 py-3 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-xl text-sm font-bold transition-all">
                    <span x-text="$store.confirmModal.cancelText"></span>
                </button>
                
                <button @click="$store.confirmModal.execute()" 
                        type="button" 
                        :class="{
                            'bg-red-600 hover:bg-red-700 shadow-red-200': $store.confirmModal.type === 'danger',
                            'bg-terralogBlue hover:bg-blue-950 shadow-blue-200': $store.confirmModal.type === 'primary',
                            'bg-[#E99817] hover:bg-orange-500 shadow-orange-200': $store.confirmModal.type === 'warning'
                        }"
                        class="flex-1 py-3 text-white shadow-lg rounded-xl text-sm font-bold transition-all active:scale-95 flex justify-center items-center gap-2">
                    <span x-text="$store.confirmModal.confirmText"></span>
                </button>
            </div>
        </div>
    </div>
</div>
