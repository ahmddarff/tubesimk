<aside class="w-[340px] bg-white rounded-[2rem] shadow-sm border border-gray-100 p-5 flex flex-col h-full overflow-hidden z-10">
    <h2 class="text-xl font-extrabold mb-4 text-gray-900 tracking-tight">Detail Pesanan</h2>
    
    <div class="flex p-1.5 bg-gray-50 border border-gray-100 rounded-xl mb-4">
        <button @click="orderType = 'dine-in'" 
                :class="orderType === 'dine-in' ? 'bg-terralogBlue text-white shadow-sm' : 'text-gray-500 hover:bg-gray-100'"
                class="flex-1 py-2 text-xs font-bold rounded-lg transition-all uppercase tracking-wider">
            Dine In
        </button>
        <button @click="orderType = 'takeaway'" 
                :class="orderType === 'takeaway' ? 'bg-terralogBlue text-white shadow-sm' : 'text-gray-500 hover:bg-gray-100'"
                class="flex-1 py-2 text-xs font-bold rounded-lg transition-all uppercase tracking-wider">
            Take Away
        </button>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-4 text-[11px] font-bold">
        <div class="col-span-2">
            <label class="text-gray-400 uppercase tracking-widest mb-1.5 block">Nama Pelanggan</label>
            <input type="text" placeholder="Masukkan nama..." class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-terralogBlue outline-none transition-colors">
        </div>
        <div>
            <label class="text-gray-400 uppercase tracking-widest mb-1.5 block">Meja</label>
            <select class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-terralogBlue outline-none transition-colors appearance-none cursor-pointer text-center">
                <option>01</option>
                <option>02</option>
                <option>03</option>
            </select>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 min-h-0">
        <template x-if="cart.length === 0">
            <div class="flex flex-col items-center justify-center h-full text-center">
                <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3">
                    <i data-lucide="shopping-basket" class="w-8 h-8 text-gray-300"></i>
                </div>
                <p class="text-sm font-bold text-gray-400">Keranjang masih kosong</p>
                <p class="text-[10px] text-gray-400 mt-1">Pilih menu dari katalog</p>
            </div>
        </template>
        
        <div class="space-y-3">
            <template x-for="(item, index) in cart" :key="index">
                <div class="flex justify-between items-center text-sm group p-2 hover:bg-gray-50 rounded-xl transition-colors -mx-2">
                    <div class="flex gap-3 items-center">
                        <div class="bg-blue-50 text-terralogBlue w-7 h-7 rounded-lg flex items-center justify-center font-black text-xs border border-blue-100" x-text="item.qty"></div>
                        <span class="font-bold text-gray-800" x-text="item.nama"></span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-terralogBlue" x-text="'Rp ' + (item.harga * item.qty).toLocaleString('id-ID')"></span>
                        <button @click="removeItem(index)" class="w-7 h-7 bg-red-50 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="pt-4 mt-2 border-t border-dashed border-gray-200">
        <div class="flex justify-between text-sm font-bold text-gray-500 mb-2">
            <span>Subtotal</span>
            <span class="text-gray-800" x-text="'Rp ' + subtotal.toLocaleString('id-ID')"></span>
        </div>
        <div class="flex justify-between text-sm font-bold text-gray-500 mb-4">
            <span>Diskon</span>
            <span class="text-emerald-500">- Rp 0</span>
        </div>
        
        <div class="flex gap-2 mb-3">
            <button @click="clearCart()" :disabled="cart.length === 0" 
                    class="flex-1 py-2.5 rounded-xl text-xs font-bold border-2 border-red-100 text-red-500 hover:bg-red-50 hover:border-red-200 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-1.5 active:scale-95">
                <i data-lucide="trash" class="w-3.5 h-3.5"></i> Hapus
            </button>
            <button @click="saveOrder()" :disabled="cart.length === 0" 
                    class="flex-1 py-2.5 rounded-xl text-xs font-bold border-2 border-blue-100 text-terralogBlue hover:bg-blue-50 hover:border-blue-200 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-1.5 active:scale-95">
                <i data-lucide="bookmark" class="w-3.5 h-3.5"></i> Simpan
            </button>
        </div>

        <button @click="if(cart.length > 0) showPayment = true" 
                :disabled="cart.length === 0"
                class="w-full py-3.5 bg-[#E99817] text-white rounded-2xl font-bold flex justify-between px-5 items-center shadow-[0_8px_20px_rgba(233,152,23,0.3)] disabled:bg-gray-200 disabled:shadow-none disabled:text-gray-400 transition-all active:scale-95">
            <span class="text-xs uppercase tracking-widest flex items-center gap-2">
                <span class="bg-white/20 px-2 py-1 rounded-lg" x-text="cart.length + ' Item'"></span> Bayar
            </span>
            <span class="text-lg font-black" x-text="'Rp ' + subtotal.toLocaleString('id-ID')"></span>
        </button>
    </div>
</aside>
