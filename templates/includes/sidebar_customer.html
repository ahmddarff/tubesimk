<!-- Sidebar Customer -->
<aside class="w-72 bg-terralogBlue text-white flex flex-col min-h-screen p-6 overflow-hidden flex-none relative">
    
    <!-- Logo -->
    <div class="mb-8 px-2 flex justify-center">
        <a href="/customer">
            <img src="{{ url_for('static', filename='images/logo.png') }}" 
                 alt="Logo Terralog" 
                 class="h-20 w-auto object-contain">
        </a>
    </div>

    <!-- Navigation Menu -->
    <nav class="space-y-2 relative z-10">
        
        <!-- Beranda -->
        <a href="/customer" 
           class="flex items-center gap-4 py-3.5 px-5 rounded-xl transition-all duration-200 
           {% if segment == 'customer' or segment == 'home' %} 
                bg-gray-100/10 border-x-4 border-terralogGold text-terralogGold shadow-md
           {% else %} 
                text-blue-100 hover:bg-white/10 
           {% endif %}">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="font-semibold text-lg">Beranda</span>
        </a>

        <!-- Daftar Menu -->
        <a href="/customer/daftar-menu" 
            class="flex items-center gap-4 py-3.5 px-5 rounded-xl transition-all duration-200 
            {% if segment == 'daftar_menu' %} 
                bg-gray-100/10 border-x-4 border-terralogGold text-terralogGold shadow-md
            {% else %} 
                text-blue-100 hover:bg-white/10 
            {% endif %}">
            <i data-lucide="utensils" class="w-6 h-6"></i>
            <span class="font-semibold text-lg">Daftar Menu</span>
        </a>

        <!-- Pesanan Saya -->
        <a href="/customer/pesanan-saya" 
            class="flex items-center gap-4 py-3.5 px-5 rounded-xl transition-all duration-200 
            {% if segment == 'pesanan_saya' %} 
                bg-gray-100/10 border-x-4 border-terralogGold text-terralogGold shadow-md
            {% else %} 
                text-blue-100 hover:bg-white/10 
            {% endif %} group">
            <i data-lucide="clipboard-list" class="w-6 h-6"></i>
            <span class="font-semibold text-lg">Pesanan Saya</span>
        </a>

        <!-- Buat Reservasi -->
        <a href="/customer/buat-reservasi" class="flex items-center gap-4 py-3.5 px-5 rounded-xl transition-all duration-200 
             {% if segment == 'buat_reservasi' %} 
                bg-gray-100/10 border-x-4 border-terralogGold text-terralogGold shadow-md
            {% else %} 
                text-blue-100 hover:bg-white/10 
            {% endif %}">
            <i data-lucide="calendar" class="w-6 h-6"></i>
            <span class="font-semibold text-lg">Buat Reservasi</span>
        </a>
    </nav>

    <!-- Background Image -->
    <div class="absolute bottom-0 left-0 w-full pointer-events-none z-0">
        <img src="{{ url_for('static', filename='images/gambar.png') }}" 
             alt="" 
             class="w-full h-auto object-contain opacity-90">
    </div>

</aside>
