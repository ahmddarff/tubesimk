<div x-show="showDetail" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-x-0"
     x-transition:leave-end="opacity-0 translate-x-full"
     class="fixed inset-0 z-[100] overflow-hidden" 
     style="display: none;">
    
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="showDetail = false"></div>

    <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white shadow-2xl flex flex-col">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-terralogBlue text-white">
            <div>
                <h3 class="text-lg font-black tracking-tight" x-text="selectedOrder.id"></h3>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest" x-text="selectedOrder.nama"></p>
            </div>
            <button @click="showDetail = false" class="p-2 hover:bg-white/10 rounded-full transition">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Status</p>
                    <span class="text-xs font-black uppercase tracking-wider" 
                          :class="{
                              'text-red-500': selectedOrder.status === 'PENDING',
                              'text-yellow-600': selectedOrder.status === 'PREPARING',
                              'text-blue-500': selectedOrder.status === 'READY',
                              'text-emerald-600': selectedOrder.status === 'SERVED'
                          }" x-text="selectedOrder.status"></span>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Meja / Tipe</p>
                    <p class="text-xs font-black text-gray-800" x-text="selectedOrder.tipe === 'DINE IN' ? 'MEJA ' + selectedOrder.meja : 'TAKE AWAY'"></p>
                </div>
            </div>

            <h4 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Daftar Pesanan</h4>
            <div class="space-y-4 mb-8">
                <template x-for="item in selectedOrder.items" :key="item.nama">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-gray-800" x-text="item.nama"></p>
                            <p class="text-[10px] text-gray-400 font-medium" x-show="item.catatan" x-text="'Catatan: ' + item.catatan"></p>
                        </div>
                        <div class="text-right ml-4">
                            <p class="text-sm font-black text-gray-800" x-text="item.qty + 'x'"></p>
                            <p class="text-[10px] font-bold text-terralogBlue" x-text="'Rp ' + (item.harga * item.qty).toLocaleString('id-ID')"></p>
                        </div>
                    </div>
                </template>
            </div>

            <div class="border-t-2 border-dashed border-gray-100 pt-4 space-y-2">
                <div class="flex justify-between text-sm font-bold text-gray-800">
                    <span>Total Pembayaran</span>
                    <span class="text-terralogBlue font-black" x-text="'Rp ' + (selectedOrder.total || 0).toLocaleString('id-ID')"></span>
                </div>
                <div class="flex justify-between text-xs font-bold">
                    <span>Status Bayar</span>
                    <span :class="selectedOrder.lunas ? 'text-emerald-600' : 'text-red-500'" 
                          x-text="selectedOrder.lunas ? 'SUDAH LUNAS' : 'BELUM BAYAR'"></span>
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50 grid grid-cols-2 gap-3">
            <button @click="editOrder" class="py-3 border-2 border-gray-200 text-gray-600 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-white transition shadow-sm">
                Edit Order
            </button>
            <button @click="updateStatus('SERVED')" class="py-3 bg-emerald-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-emerald-700 transition shadow-md">
                Sajikan (Served)
            </button>
        </div>
    </div>
</div>
