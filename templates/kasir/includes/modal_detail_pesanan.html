<div x-show="showDetail" 
     class="fixed inset-0 z-[100] overflow-hidden" 
     x-cloak>
    
    <div x-show="showDetail"
         x-transition:enter="transition opacity ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition opacity ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="showDetail = false"
         class="absolute inset-0 bg-black/60 backdrop-blur-sm">
    </div>

    <div x-show="showDetail"
         x-transition:enter="transition transform ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition transform ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="absolute inset-y-0 right-0 max-w-md w-full bg-white shadow-2xl flex flex-col">
        
        <div class="px-6 py-4 flex justify-between items-center bg-terralogBlue text-white z-20 shadow-md">
            <h2 class="text-xl font-bold tracking-wide">Detail Pesanan</h2>
            <button @click="showDetail = false" class="p-1 hover:bg-white/20 rounded-full transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto bg-white custom-scrollbar">
            
            <div class="p-6 border-b-[3px] border-terralogBlue bg-white">
                <div class="flex justify-between items-end mb-1">
                    <h3 class="text-xl font-black text-terralogBlue tracking-tight" x-text="selectedOrder.id"></h3>
                    <div class="flex items-center gap-2 mb-0.5">
                        <span class="text-[13px] text-terralogBlue font-black" x-text="formatWaktuLokal(selectedOrder.waktu_iso)"></span>
                        <span class="text-[9px] bg-terralogBlue/10 text-terralogBlue px-1.5 py-0.5 rounded font-bold" x-text="timeAgo(selectedOrder.waktu_iso)"></span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center mb-6">
                    <p class="text-lg font-bold text-terralogBlue/80 uppercase leading-tight truncate pr-4" x-text="selectedOrder.nama || 'Tamu'"></p>
                    <span class="px-2.5 py-1 bg-terralogBlue text-white rounded-lg text-[10px] font-black uppercase tracking-widest shadow-sm" 
                          x-text="selectedOrder.tipe === 'DINE IN' ? 'Meja ' + (selectedOrder.meja || '-') : 'Take Away'">
                    </span>
                </div>

                <div class="flex gap-2">
                    <span class="px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-wider shadow-sm border"
                          :class="{
                              'bg-red-500 text-white border-red-500': selectedOrder.status === 'PENDING',
                              'bg-yellow-400 text-yellow-900 border-yellow-400': selectedOrder.status === 'PREPARING',
                              'bg-blue-500 text-white border-blue-500': selectedOrder.status === 'READY',
                              'bg-emerald-600 text-white border-emerald-600': selectedOrder.status === 'SERVED'
                          }" x-text="selectedOrder.status"></span>
                </div>
            </div>

            <div class="px-6 py-2">
                <template x-for="(item, index) in selectedOrder.items" :key="index">
                    <div class="flex justify-between items-center py-4 border-b border-terralogBlue/30 last:border-0 group">
                        <div class="flex gap-4 items-start">
                            <span class="text-[15px] font-bold text-gray-800 w-3 text-right" x-text="item.qty"></span>
                            <div>
                                <p class="text-[15px] font-bold text-gray-800 leading-tight" x-text="item.nama"></p>
                                <template x-if="item.catatan">
                                    <p class="text-[12px] text-gray-400 font-normal mt-1 leading-snug" x-text="'- ' + item.catatan"></p>
                                </template>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <p class="text-[15px] font-bold text-gray-800 whitespace-nowrap" 
                               x-text="'Rp ' + (item.harga * item.qty).toLocaleString('id-ID')">
                            </p>
                            
                            <div class="flex justify-end min-w-[85px]">
                                <template x-if="['pending', 'preparing'].includes(item.status)">
                                    <span class="px-2 py-1 rounded text-[9px] font-black uppercase tracking-wider text-center"
                                          :class="item.status === 'pending' ? 'bg-red-50 text-red-500 border border-red-100' : 'bg-yellow-50 text-yellow-600 border border-yellow-100'"
                                          x-text="item.status"></span>
                                </template>

                                <template x-if="item.status === 'ready'">
                                    <button @click.stop="serveItem(item)"
                                            class="w-[65px] py-1.5 bg-emerald-600 text-white hover:bg-emerald-700 rounded-md flex items-center justify-center transition-all text-[10px] font-black uppercase tracking-widest shadow-sm active:scale-95">
                                        Antar
                                    </button>
                                </template>

                                <template x-if="item.status === 'served'">
                                    <span class="px-2 py-1 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded text-[9px] font-black uppercase tracking-wider text-center" 
                                          x-text="item.status"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="bg-gray-50 border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
            <div class="p-6 pb-3 space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Status Pembayaran</span>
                    <span class="px-2.5 py-1 rounded-md text-[10px] font-black"
                          :class="selectedOrder.lunas ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'"
                          x-text="selectedOrder.lunas ? 'SUDAH LUNAS' : 'BELUM DIBAYAR'">
                    </span>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-200 mt-2">
                    <span class="text-sm font-black text-gray-900 uppercase">Total Tagihan</span>
                    <span class="text-xl font-black text-terralogBlue tracking-tight" x-text="'Rp ' + (selectedOrder.total || 0).toLocaleString('id-ID')"></span>
                </div>
            </div>

            <div class="px-6 pb-3 flex gap-2">
                <button :disabled="selectedOrder.lunas"
                        @click="openCancelModal()" 
                        :class="selectedOrder.lunas ? 'border-gray-200 text-gray-400 bg-gray-50 cursor-not-allowed opacity-60' : 'border-red-100 text-red-500 bg-white hover:bg-red-50'"
                        class="flex-1 py-2.5 border-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 active:scale-95 disabled:opacity-40">
                    <i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Batal
                </button>

                <button :disabled="selectedOrder.lunas"
                        @click="editOrder" 
                        :class="selectedOrder.lunas ? 'border-gray-200 text-gray-400 bg-gray-50 cursor-not-allowed opacity-60' : 'border-blue-100 text-terralogBlue bg-white hover:bg-blue-50'"
                        class="flex-1 py-2.5 border-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 active:scale-95 disabled:opacity-40">
                    <i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Edit
                </button>
                
                <button @click="showToast('Fitur cetak struk akan segera hadir!', 'error')"
                        class="flex-1 py-2.5 border-2 border-emerald-100 text-emerald-600 bg-white hover:bg-emerald-50 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1.5 active:scale-95">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i> Struk
                </button>
            </div>

            <div class="px-6 pb-6">
                <button :disabled="selectedOrder.lunas" 
                        @click="showToast('Membuka modul pembayaran...', 'success')"
                        :class="selectedOrder.lunas ? 'bg-gray-200 text-gray-400 shadow-none cursor-not-allowed' : 'bg-[#E99817] shadow-lg shadow-orange-200 text-white hover:bg-orange-500 active:scale-95'"
                        class="w-full py-4 rounded-2xl font-bold flex justify-between items-center px-5 transition-all">
                    <span class="text-xs uppercase tracking-widest flex items-center gap-2 font-black">
                        <i :data-lucide="selectedOrder.lunas ? 'check-square' : 'credit-card'" class="w-4 h-4"></i>
                        <span x-text="selectedOrder.lunas ? 'Tagihan Telah Lunas' : 'Bayar Sekarang'"></span>
                    </span>
                    <span x-show="!selectedOrder.lunas" class="text-lg font-black tracking-tight" x-text="'Rp ' + (selectedOrder.total || 0).toLocaleString('id-ID')"></span>
                </button>
            </div>
        </div>
    </div>
</div>
