<div x-show="showCancelModal" class="fixed inset-0 z-[200] overflow-y-auto" x-cloak>
    <div x-show="showCancelModal"
         x-transition.opacity.duration.300ms
         @click="showCancelModal = false"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
        <div x-show="showCancelModal"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative inline-block w-full max-w-md p-6 overflow-hidden text-left align-middle transition-all transform bg-white shadow-2xl rounded-2xl">
            
            <div class="flex flex-col items-center justify-center mb-5">
                <div class="flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-red-600"></i>
                </div>
                <h3 class="text-xl font-black text-gray-900">Batalkan Pesanan?</h3>
                <p class="text-sm font-medium text-gray-500 mt-1 text-center" x-text="'Tindakan ini akan membatalkan pesanan ' + selectedOrder.id + ' dan mengosongkan meja.'"></p>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Alasan Batal (Opsional)</label>
                <textarea x-model="cancelReason" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-red-500 outline-none text-sm font-medium transition-all" placeholder="Misal: Pelanggan tidak jadi pesan..."></textarea>
            </div>

            <div class="flex gap-3">
                <button @click="showCancelModal = false" type="button" class="flex-1 py-3 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-xl text-sm font-bold transition-all">
                    Kembali
                </button>
                <button @click="confirmCancelOrder()" type="button" class="flex-1 py-3 bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-200 rounded-xl text-sm font-bold transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Batalkan
                </button>
            </div>
        </div>
    </div>
</div>
