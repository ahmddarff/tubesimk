<div x-show="showSuccess" class="fixed inset-0 z-[120] flex items-center justify-center" x-cloak>
    <div x-transition:opacity class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    
    <div class="relative bg-white w-[400px] rounded-[2rem] shadow-2xl p-8 flex flex-col items-center text-center"
         x-transition:enter="transition ease-out duration-300 transform scale-95 opacity-0">

        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-6 border-4 border-green-100">
            <i data-lucide="check-circle" class="w-12 h-12 text-green-500"></i>
        </div>

        <h2 class="text-2xl font-black text-gray-800 mb-2">Pembayaran Berhasil!</h2>
        <p class="text-sm font-semibold text-gray-400 mb-8">Pesanan sudah diteruskan ke dapur.</p>

        <div class="w-full bg-gray-50 rounded-2xl p-5 mb-8 border border-gray-100 text-left space-y-3">
            <div class="flex justify-between items-center text-sm font-bold">
                <span class="text-gray-500 uppercase tracking-wide text-xs">Total Tagihan</span>
                <span class="text-terralogBlue text-base" x-text="'Rp ' + subtotal.toLocaleString('id-ID')"></span>
            </div>
            
            <div class="flex justify-between items-center text-sm font-bold">
                <span class="text-gray-500 uppercase tracking-wide text-xs">Metode Bayar</span>
                <span class="text-gray-800 bg-gray-200 px-2 py-0.5 rounded uppercase text-xs" x-text="paymentMethod"></span>
            </div>

            <div x-show="paymentMethod === 'CASH'" class="pt-3 border-t border-gray-200 mt-3 flex justify-between items-center text-sm font-bold">
                <span class="text-gray-500 uppercase tracking-wide text-xs">Kembalian</span>
                <span class="text-green-600 text-lg" x-text="'Rp ' + Math.max(0, parseInt(receivedAmount) - subtotal).toLocaleString('id-ID')"></span>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full">
            <button @click="printReceipt()" class="w-full py-3.5 bg-terralogBlue text-white rounded-xl font-black text-sm uppercase tracking-widest hover:bg-blue-900 shadow-md transition-colors active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="printer" class="w-5 h-5"></i> Cetak Struk
            </button>
            
            <button @click="showSuccess = false; receivedAmount = '0'; cart = []; customerName = ''; selectedTable = '';" 
                    class="w-full py-3.5 bg-white border-2 border-gray-200 text-gray-600 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-gray-50 transition-colors active:scale-95">
                Selesai & Pesanan Baru
            </button>
        </div>
    </div>
</div>
