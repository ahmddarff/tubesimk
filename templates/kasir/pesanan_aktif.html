{% extends 'layouts/layout_kasir.html' %}

{% block content %}
<div x-data="pesananAktif()" 
     @keydown.window="handlePhysicKey($event.key)"
     class="font-['Inter']" x-cloak>

    <div class="grid grid-cols-4 gap-3 mb-6">
        {% for title, val in statistik %}
        <div class="bg-[#F7E190] p-3 rounded-lg shadow-sm border border-black/5">
            <p class="text-[10px] uppercase tracking-wider font-semibold text-gray-700">
                {{ title }}
            </p>
            <p class="text-lg font-bold">
                {{ val }}
            </p>
        </div>
        {% endfor %}
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-terralogBlue">
                Pesanan Aktif
            </h2>
            <p class="font-bold text-terralogBlue text-lg" x-text="todayDate"></p>
        </div>

        <div class="flex gap-4 mb-6 flex-wrap">
            <template x-for="stat in ['SEMUA', 'PENDING', 'READY', 'SERVED']" :key="stat">
                <button 
                    @click="filterStatus = stat" 
                    :class="filterStatus === stat ? 'bg-terralogBlue text-white' : 'border border-terralogBlue text-terralogBlue'"
                    class="px-8 py-2 rounded-full font-bold text-sm transition"
                    x-text="stat"
                ></button>
            </template>
        </div>

        <div class="flex gap-4 mb-8 flex-wrap">
            <div class="relative flex-1 min-w-[250px]">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
                <input 
                    type="text"
                    x-model="searchQuery"
                    placeholder="Cari No. Pesanan atau Pelanggan..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-terralogBlue"
                >
            </div>

            <select x-model="filterTipe" class="border border-terralogBlue rounded-lg px-4 py-2 text-sm text-terralogBlue font-medium focus:outline-none bg-white">
                <option value="SEMUA">Semua Tipe</option>
                <option value="DINE IN">Dine In</option>
                <option value="TAKE AWAY">Take Away</option>
            </select>

            <select x-model="filterPembayaran" class="border border-terralogBlue rounded-lg px-4 py-2 text-sm text-terralogBlue font-medium focus:outline-none bg-white">
                <option value="SEMUA">Semua Pembayaran</option>
                <option value="LUNAS">Lunas</option>
                <option value="BELUM LUNAS">Belum Lunas</option>
            </select>
        </div>

        <div class="grid grid-cols-4 gap-3">
            
            <template x-for="p in filteredPesanan" :key="p.id">
                <div 
                    @click="openDetail(p)"
                    class="cursor-pointer relative rounded-xl px-3 py-2.5 shadow-sm border transition-all hover:shadow-md overflow-hidden flex flex-col justify-between"
                    :class="{
                        'border-yellow-400 bg-yellow-50': p.status === 'PENDING' || p.status === 'PREPARING',
                        'border-blue-500 bg-blue-50': p.status === 'READY',
                        'border-emerald-600 bg-emerald-50': p.status === 'SERVED'
                    }"
                >
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-1.5">
                            <h3 class="font-black text-base text-gray-800 leading-none" x-text="p.id"></h3>
                            <span class="text-[9px] font-bold text-gray-400" x-text="p.waktu"></span>
                        </div>

                        <div class="mb-2">
                            <span class="inline-block px-2.5 py-0.5 rounded text-[10px] font-black uppercase tracking-wider"
                                :class="{
                                    'bg-yellow-400 text-black': p.status === 'PENDING' || p.status === 'PREPARING',
                                    'bg-blue-500 text-white': p.status === 'READY',
                                    'bg-emerald-600 text-white': p.status === 'SERVED'
                                }"
                                x-text="p.status">
                            </span>
                        </div>

                        <div class="flex justify-between items-center mb-2.5">
                            <p class="text-[11px] font-bold text-gray-700 truncate max-w-[90px]" x-text="p.nama"></p>

                            <div class="flex items-center gap-1 text-blue-900 font-bold text-[10px]">
                                <span x-show="p.tipe === 'DINE IN'">🍽️</span>
                                <span x-show="p.tipe !== 'DINE IN'">🛍️</span>
                                <span x-text="p.tipe === 'DINE IN' ? p.meja : 'TA'"></span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between border-t border-gray-200/50 pt-2">
                            <p class="text-sm font-black text-terralogBlue" x-text="'Rp ' + p.total.toLocaleString('id-ID')"></p>
                            <button class="px-3 py-1 bg-[#E99817] text-white rounded-lg font-black text-[9px] uppercase hover:bg-[#CE7411] transition shadow-sm">
                                Detail
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <div x-show="filteredPesanan.length === 0" class="col-span-4 text-center py-10 text-gray-400 font-medium">
                Tidak ada pesanan yang sesuai dengan filter.
            </div>

        </div>

    </div>
</div>

<script id="data-pesanan" type="application/json">
    {{ pesanan | tojson | safe }}
</script>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('pesananAktif', () => ({
        // State Filter
        filterStatus: 'SEMUA',
        filterTipe: 'SEMUA',
        filterPembayaran: 'SEMUA',
        searchQuery: '',

        // State Modal & Data
        showDetail: false, 
        showPayment: false, 
        paymentMethod: 'CASH', 
        receivedAmount: '0',
        selectedOrder: {},
        showSuccess: false,

        // Mengambil data dari backend
        pesanan: JSON.parse(document.getElementById('data-pesanan').textContent),

        get todayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            let mm = today.getMonth() + 1; // Bulan dimulai dari 0
            let dd = today.getDate();
            if (dd < 10) dd = '0' + dd;
            if (mm < 10) mm = '0' + mm;
            return dd + '/' + mm + '/' + yyyy;
        },

        // Komputasi filter real-time
        get filteredPesanan() {
            return this.pesanan.filter(p => {
                const matchStatus = this.filterStatus === 'SEMUA' || p.status === this.filterStatus;
                const matchTipe = this.filterTipe === 'SEMUA' || p.tipe === this.filterTipe;
                
                let matchPembayaran = true;
                if (this.filterPembayaran === 'LUNAS') matchPembayaran = p.lunas === true;
                if (this.filterPembayaran === 'BELUM LUNAS') matchPembayaran = p.lunas === false;

                const matchSearch = this.searchQuery === '' || 
                                    p.id.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                    p.nama.toLowerCase().includes(this.searchQuery.toLowerCase());
                
                return matchStatus && matchTipe && matchPembayaran && matchSearch;
            });
        },

        openDetail(orderData) {
            this.showDetail = true;
            this.selectedOrder = orderData;
        },

        updateStatus(newStatus) {
            this.selectedOrder.status = newStatus;
            const orderIndex = this.pesanan.findIndex(p => p.id === this.selectedOrder.id);
            if (orderIndex !== -1) {
                this.pesanan[orderIndex].status = newStatus;
            }
            // Dalam implementasi nyata, Anda perlu mengirim request AJAX (fetch/axios) 
            // ke Flask untuk memperbarui status di database permanen.
        },

        editOrder() {
            window.location.href = '/kasir?edit=' + this.selectedOrder.id;
        }, 
        
        handlePhysicKey(key) {
            if (!this.showPayment || this.paymentMethod !== 'CASH') return;
            if (!isNaN(key)) {
                this.receivedAmount === '0' ? this.receivedAmount = key : this.receivedAmount += key;
            } else if (key === 'Backspace') {
                this.receivedAmount = this.receivedAmount.length > 1 ? this.receivedAmount.slice(0, -1) : '0';
            } else if (key === 'Enter') {
                this.showSuccess = true;
            }
        }
    }));
});
</script>
{% endblock %}
