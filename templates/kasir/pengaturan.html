{% extends 'layouts/layout_kasir.html' %}

{% block content %}
<div 
    x-data="{ 
        activeTab: 'akun',

        showPasswordModal: false,

        currentPassword: '',
        newPassword: '',
        confirmPassword: '',

        savePassword(endpointUrl) {
            if (!this.currentPassword) { alert('Kata sandi saat ini wajib diisi!'); return; }
            if (this.newPassword.length < 8) { alert('Kata sandi baru minimal 8 karakter!'); return; }
            if (this.newPassword !== this.confirmPassword) { alert('Konfirmasi kata sandi tidak cocok!'); return; }

            // Lakukan request ke Backend Flask
            fetch(endpointUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    password_lama: this.currentPassword, 
                    password_baru: this.newPassword 
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    // Kosongkan form jika berhasil
                    this.currentPassword = '';
                    this.newPassword = '';
                    this.confirmPassword = '';
                } else {
                    alert(data.message); // Tampilkan pesan error (misal: password salah)
                }
            })
            .catch(err => {
                alert('Terjadi kesalahan sistem saat menghubungi server.');
            });
        }
    }"
    x-init="$nextTick(() => lucide.createIcons())"
    class="p-5 bg-[#F8FAFC] min-h-screen font-['Inter']"
>

    <div class="mb-4">
        <h1 class="text-2xl font-extrabold text-terralogBlue tracking-tight">
            Pengaturan
        </h1>

        <p class="text-gray-500 mt-1 text-sm">
            Kelola data dan keamanan akun kasir Anda
        </p>
    </div>

    <div class="flex flex-wrap gap-3 mb-6">

        <button 
            @click="
                activeTab = 'akun';
                showPasswordModal = false;
                $nextTick(() => lucide.createIcons())
            "
            :class="activeTab === 'akun'
                ? 'bg-terralogBlue text-white shadow-lg'
                : 'bg-white text-gray-500 hover:text-terralogBlue'"
            class="flex items-center gap-3 px-5 py-2.5 rounded-2xl font-semibold transition-all duration-300 border border-gray-100 text-sm"
        >
            <i data-lucide="user" class="w-4 h-4"></i>
            Profil Akun
        </button>

        <button 
            @click="
                activeTab = 'keamanan';
                showPasswordModal = false;
                $nextTick(() => lucide.createIcons())
            "
            :class="activeTab === 'keamanan'
                ? 'bg-terralogBlue text-white shadow-lg'
                : 'bg-white text-gray-500 hover:text-terralogBlue'"
            class="flex items-center gap-3 px-5 py-2.5 rounded-2xl font-semibold transition-all duration-300 border border-gray-100 text-sm"
        >
            <i data-lucide="shield-check" class="w-4 h-4"></i>
            Keamanan
        </button>
    </div>

    <div class="bg-white rounded-[1.8rem] shadow-sm border border-gray-100 p-6">

        <div x-show="activeTab === 'akun'" x-transition>

            <div class="flex flex-col md:flex-row md:items-center gap-6 pb-6 border-b border-gray-100">

                <div class="relative">
                    <div class="w-24 h-24 rounded-full bg-terralogBlue flex items-center justify-center text-white text-3xl font-black shadow-lg uppercase">
                        {{ user.name[:2] }}
                    </div>

                    <button 
                        class="absolute bottom-0 right-0 bg-white shadow border border-gray-100 p-2 rounded-full hover:bg-gray-50 transition"
                        @click="alert('Fitur ubah foto profil akan segera tersedia!')"
                    >
                        <i data-lucide="camera" class="w-4 h-4 text-terralogBlue"></i>
                    </button>
                </div>

                <div>
                    <h2 class="text-2xl font-black text-gray-800">
                        {{ user.name }}
                    </h2>

                    <p class="text-gray-400 font-medium mt-1 text-sm capitalize">
                        {{ user.role }} 
                    </p>
                </div>

            </div>

            <form action="{{ url_for('kasir.pengaturan') }}" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6 mt-8">

                    <div>
                        <label class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wide">
                            Nama Lengkap
                        </label>
                        <input 
                            name="name"
                            type="text"
                            value="{{ user.name }}"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition text-sm shadow-sm"
                        >
                    </div>

                    <div>
                        <label class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wide">
                            Username
                        </label>
                        <input 
                            name="username"
                            type="text"
                            value="{{ user.username }}"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition text-sm shadow-sm"
                        >
                    </div>

                    <div>
                        <label class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wide">
                            Email Kantor
                        </label>
                        <input 
                            name="email"
                            type="email"
                            value="{{ user.email if user.email else '' }}"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition text-sm shadow-sm"
                        >
                    </div>

                    <div>
                        <label class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wide">
                            No. Telepon
                        </label>
                        <input 
                            name="phone"
                            type="text"
                            value="{{ user.phone if user.phone else '' }}"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition text-sm shadow-sm"
                        >
                    </div>

                </div>

                <div class="flex justify-end mt-10 pt-6 border-t border-gray-50">
                    <button 
                        type="submit"
                        class="px-8 py-3 bg-terralogBlue hover:bg-blue-900 text-white rounded-xl font-bold tracking-wide transition shadow-md hover:shadow-lg active:scale-95 text-sm"
                    >
                        Simpan Perubahan
                    </button>
                </div>
            </form>
        </div> 
        
        <div x-show="activeTab === 'keamanan'" x-transition>
            <div class="max-w-sm">
                <h3 class="text-base font-bold text-terralogBlue mb-5">Ubah Kata Sandi</h3>

                <div class="flex flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-gray-800">Kata Sandi Saat Ini</label>
                        <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden bg-white focus-within:border-terralogBlue transition-colors">
                            <input type="password" x-model="currentPassword" placeholder="Masukkan kata sandi saat ini"
                                   class="flex-1 px-4 py-2.5 text-sm outline-none bg-transparent">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-gray-800">Kata Sandi Baru</label>
                        <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden bg-white focus-within:border-terralogBlue transition-colors">
                            <input type="password" x-model="newPassword" placeholder="Masukkan kata sandi baru"
                                   class="flex-1 px-4 py-2.5 text-sm outline-none bg-transparent">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-gray-800">Konfirmasi Kata Sandi Baru</label>
                        <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden bg-white focus-within:border-terralogBlue transition-colors">
                            <input type="password" x-model="confirmPassword" placeholder="Ulangi kata sandi baru"
                                   class="flex-1 px-4 py-2.5 text-sm outline-none bg-transparent">
                        </div>
                    </div>

                    <p class="text-xs text-gray-400">Minimal 8 karakter dengan kombinasi huruf dan angka.</p>

                    <div class="flex justify-end mt-1">
                        <button @click="savePassword('{{ url_for(role ~ '.update_password') }}')"
                                class="px-6 py-2.5 rounded-xl bg-terralogBlue text-white text-sm font-bold hover:bg-blue-900 transition-all shadow-md">
                            Perbarui Kata Sandi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div 
        x-show="showPasswordModal"
        x-cloak
        x-transition
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
    >

        <div 
            @click.away="showPasswordModal = false"
            class="bg-white w-full max-w-md rounded-[1.8rem] p-6 shadow-2xl"
        >

            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-black text-gray-800">
                    Ganti Password
                </h2>

                <button 
                    @click="showPasswordModal = false"
                    class="w-9 h-9 rounded-full hover:bg-gray-100 flex items-center justify-center transition"
                >
                    ✕
                </button>
            </div>

            <div class="space-y-4">

                <div>
                    <label class="block mb-2 text-sm font-bold text-gray-500">
                        Password Lama
                    </label>

                    <input 
                        type="password"
                        x-model="currentPassword"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition"
                    >
                </div>

                <div>
                    <label class="block mb-2 text-sm font-bold text-gray-500">
                        Password Baru
                    </label>

                    <input 
                        type="password"
                        x-model="newPassword"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition"
                    >
                </div>

                <div>
                    <label class="block mb-2 text-sm font-bold text-gray-500">
                        Konfirmasi Password
                    </label>

                    <input 
                        type="password"
                        x-model="confirmPassword"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-terralogBlue outline-none transition"
                    >
                </div>

            </div>

            <div class="flex justify-end gap-3 mt-6">

                <button 
                    @click="showPasswordModal = false"
                    class="px-5 py-3 rounded-xl border border-gray-200 font-semibold hover:bg-gray-50 transition text-sm"
                >
                    Batal
                </button>

                <button 
                    @click="savePassword()"
                    class="px-5 py-3 bg-terralogBlue text-white rounded-xl font-semibold hover:bg-blue-900 transition text-sm"
                >
                    Simpan
                </button>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener('alpine:init', () => {
        lucide.createIcons();
    });
</script>
{% endblock %}
