<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Terralog Coffee & Eatery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        .logo-text {
            font-family: 'Poppins', sans-serif !important;
            letter-spacing: -1px;
        }
        [x-cloak] { display: none !important; }
    </style>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
                logo: ['Poppins', 'sans-serif'],
              },
              colors: {
                terralogBlue: '#0522A4',
                terralogOrange: '#E99817',
                terralogPeach: '#F7E190',
              }
            }
          }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans" x-data="{ showPassword: false, showConfirmPassword: false }">
    <div class="min-h-screen flex">
        <!-- Left Side - Brand Section -->
        <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-terralogBlue to-blue-900 flex-col items-center justify-center p-8 relative overflow-hidden">
            <!-- Decorative Elements -->
            <div class="absolute top-20 right-32 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-20 left-20 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 text-center max-w-md">
                <!-- Logo -->
                <div class="mb-8">
                    <h2 class="logo-text text-6xl font-bold text-white mb-2">terralog</h2>
                    <p class="text-white/80 text-sm tracking-widest font-medium">COFFEE & EATERY</p>
                </div>
                
                <!-- Illustration -->
                <img src="/static/images/gambar.png" alt="Coffee Shop Illustration" class="w-full rounded-2xl shadow-2xl mb-8 drop-shadow-lg">
                
                <!-- Tagline -->
                <p class="text-white/80 text-base leading-relaxed">
                    Bergabunglah dengan komunitas Terralog dan nikmati pengalaman kopi premium terbaik.
                </p>
            </div>
        </div>

        <!-- Right Side - Register Form -->
        <div class="flex-1 flex items-center justify-center p-6 lg:w-1/2 overflow-y-auto">
            <div class="w-full max-w-md py-8">
                <!-- Mobile Logo -->
                <div class="lg:hidden text-center mb-8">
                    <h2 class="logo-text text-4xl font-bold text-terralogBlue">terralog</h2>
                    <p class="text-gray-600 text-xs tracking-widest font-medium">COFFEE & EATERY</p>
                </div>

                <!-- Form Title -->
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Daftar</h1>
                <p class="text-gray-600 mb-8">Lengkapi informasi dibawah ini untuk mendaftar</p>

                <!-- Register Form -->
                <form action="/register" method="POST" class="space-y-5">
                    <!-- Username Field -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                            <input 
                                type="text" 
                                id="username"
                                name="username" 
                                class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:bg-white focus:border-terralogBlue focus:outline-none focus:ring-2 focus:ring-terralogBlue/20 transition"
                                placeholder="Pilih username unik Anda"
                                required
                            >
                        </div>
                    </div>

                    <!-- Full Name Field -->
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                        <div class="relative">
                            <i data-lucide="user-check" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                            <input 
                                type="text" 
                                id="fullname"
                                name="fullname" 
                                class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:bg-white focus:border-terralogBlue focus:outline-none focus:ring-2 focus:ring-terralogBlue/20 transition"
                                placeholder="Masukkan nama lengkap Anda"
                                required
                            >
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                            <input 
                                type="email" 
                                id="email"
                                name="email" 
                                class="w-full pl-10 pr-4 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:bg-white focus:border-terralogBlue focus:outline-none focus:ring-2 focus:ring-terralogBlue/20 transition"
                                placeholder="Masukkan email Anda"
                                required
                            >
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                            <input 
                                :type="showPassword ? 'text' : 'password'" 
                                id="password"
                                name="password" 
                                class="w-full pl-10 pr-12 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:bg-white focus:border-terralogBlue focus:outline-none focus:ring-2 focus:ring-terralogBlue/20 transition"
                                placeholder="Buat password yang kuat (min. 6 karakter)"
                                required
                                minlength="6"
                            >
                            <button 
                                type="button" 
                                @click="showPassword = !showPassword"
                                class="absolute right-3 top-3 text-gray-500 hover:text-terralogBlue transition"
                            >
                                <i data-lucide="eye" class="w-5 h-5" x-show="!showPassword"></i>
                                <i data-lucide="eye-off" class="w-5 h-5" x-show="showPassword"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Konfirmasi Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                            <input 
                                :type="showConfirmPassword ? 'text' : 'password'" 
                                id="confirm_password"
                                name="confirm_password" 
                                class="w-full pl-10 pr-12 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:bg-white focus:border-terralogBlue focus:outline-none focus:ring-2 focus:ring-terralogBlue/20 transition"
                                placeholder="Ulangi password Anda"
                                required
                            >
                            <button 
                                type="button" 
                                @click="showConfirmPassword = !showConfirmPassword"
                                class="absolute right-3 top-3 text-gray-500 hover:text-terralogBlue transition"
                            >
                                <i data-lucide="eye" class="w-5 h-5" x-show="!showConfirmPassword"></i>
                                <i data-lucide="eye-off" class="w-5 h-5" x-show="showConfirmPassword"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        class="w-full py-2.5 px-4 bg-gradient-to-r from-terralogBlue to-blue-800 text-white font-semibold rounded-lg hover:shadow-lg transition-all duration-200 transform hover:scale-[1.01] active:scale-[0.99] mt-6"
                    >
                        Daftar
                    </button>
                </form>

                <!-- Login Link -->
                <div class="mt-8 text-center">
                    <p class="text-gray-600 text-sm">
                        Sudah punya akun? 
                        <a href="/login" class="font-semibold text-terralogBlue hover:text-blue-700 transition">
                            Masuk
                        </a>
                    </p>
                </div>

                <!-- Divider -->
                <div class="mt-8 pt-8 border-t border-gray-200">
                    <p class="text-xs text-gray-500 text-center">
                        © 2024 Terralog Coffee & Eatery. Semua hak dilindungi.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
